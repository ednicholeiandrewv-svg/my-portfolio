<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#FFC0CB' } } }
        }
    </script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen">

    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md border border-primary/30">
        <h2 class="text-3xl font-bold text-center mb-6 text-primary">LOGIN</h2>
        
        <div id="message" class="mb-4 text-center hidden"></div>

        <form id="loginForm">
            <div class="mb-4">
                <label class="block mb-2">Username</label>
                <input type="text" id="username" class="w-full p-3 rounded bg-gray-700 border border-gray-600 focus:border-primary outline-none" required>
            </div>
            <div class="mb-6">
                <label class="block mb-2">Password</label>
                <input type="password" id="password" class="w-full p-3 rounded bg-gray-700 border border-gray-600 focus:border-primary outline-none" required>
            </div>
            
            <button type="submit" class="w-full bg-primary hover:bg-pink-500 text-black font-bold py-3 rounded transition">
                SIGN IN
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const messageBox = document.getElementById('message');

            if(username === "" || password === "") {
                messageBox.className = "mb-4 text-center text-red-500";
                messageBox.innerHTML = "❌ Please fill in all fields!";
                messageBox.classList.remove('hidden');
            } 
            else if(username === "ednicholeiandrew@gmail.com" && password === "ed123") {
                messageBox.className = "mb-4 text-center text-green-500";
                messageBox.innerHTML = "✅ Login Success! Redirecting...";
                messageBox.classList.remove('hidden');
                
                setTimeout(() => {
                    window.location.href = "portfolio_.html";
                }, 1500);
            } 
            else {
                messageBox.className = "mb-4 text-center text-red-500";
                messageBox.innerHTML = "❌ Invalid Username or Password!";
                messageBox.classList.remove('hidden');
            }
        });
    </script>

</body>
</html>
